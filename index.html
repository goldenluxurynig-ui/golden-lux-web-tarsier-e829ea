<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golden Luxury</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body{
  background: linear-gradient(135deg,#ffe4ec,#fff0f5,#ffd6e8);
  font-family: sans-serif;
  margin:0;
}

.header{
  text-align:center;
  padding:20px;
}

.header h1{
  color:#e91e63;
  font-size:30px;
}

#products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  margin-top:8px;
  background:#e91e63;
  color:white;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.cart{
  background:white;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:12px 15px;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
  <h1>Golden Luxury 💖</h1>
  <p>Girly Accessories Store</p>
</div>

<div id="products"></div>

<div class="cart">
  <h2>Cart</h2>
  <ul id="cartList"></ul>
  <h3>Total: ₦<span id="total">0</span></h3>

  <input type="email" id="email" placeholder="Enter your email">

  <button onclick="pay()">Pay Now</button>
</div>

<a class="whatsapp" href="https://wa.me/2349019292124" target="_blank">
💬 Chat
</a>

<script>
const products = [
  {name:"Pimple Patch", price:1000},
  {name:"Phone Suction", price:1300},
  {name:"Mini Fan", price:3800},
  {name:"Tote Bag", price:2000},
  {name:"Lip Gloss", price:1500},
  {name:"Necklace", price:2500},
  {name:"Bracelet", price:1800},
  {name:"Hair Clips", price:1200},
  {name:"Perfume", price:5000},
  {name:"Handbag", price:7000}
];

let cart = [];

/* ---------- LOAD PRODUCTS ---------- */
function loadProducts(){
  let box = document.getElementById("products");
  box.innerHTML = "";

  products.forEach(p=>{
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${p.name}</h3>
      <p>₦${p.price}</p>
      <button onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
    `;

    box.appendChild(div);
  });
}

/* ---------- CART ---------- */
function addToCart(name, price){
  let item = cart.find(i => i.name === name);

  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }

  updateCart();
}

function removeItem(name){
  cart = cart.filter(i => i.name !== name);
  updateCart();
}

function updateCart(){
  let list = document.getElementById("cartList");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(i=>{
    let li = document.createElement("li");
    li.innerHTML = `
      ${i.name} x${i.qty} - ₦${i.price * i.qty}
      <button onclick="removeItem('${i.name}')">❌</button>
    `;
    list.appendChild(li);

    total += i.price * i.qty;
  });

  document.getElementById("total").innerText = total;
}

/* ---------- PAYMENT ---------- */
function pay(){

  let total = cart.reduce((a,b)=>a + (b.price * b.qty), 0);

  if(total === 0){
    alert("Cart is empty");
    return;
  }

  let email = document.getElementById("email").value;

  if(!email){
    alert("Please enter your email");
    return;
  }

  let handler = PaystackPop.setup({
    key: "pk_test_a23deac67faa41f40a243f9923d26928fa9e0fe2",
    email: email,
    amount: total * 100,
    currency: "NGN",

    callback: function(response){

      alert("Payment Successful 💖\nRef: " + response.reference);

      cart = [];
      updateCart();
    },

    onClose: function(){
      alert("Payment cancelled");
    }
  });

  handler.openIframe();
}

/* ---------- INIT ---------- */
window.onload = loadProducts;
</script>

</body>
</html>
